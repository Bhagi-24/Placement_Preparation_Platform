<!DOCTYPE html>
<html>
<head>
    <title>Select Company - HR Questions</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #d1e0f0, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background-color: white;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h2 {
            margin-bottom: 20px;
            color: #1a237e;
        }

        label {
            font-size: 18px;
            margin-bottom: 10px;
            display: block;
            color: #333;
        }

        select {
            padding: 10px;
            font-size: 16px;
            margin: 15px 0;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            background-color: #1a237e;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0d133f;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Select Company to View HR Questions</h2>
        <form method="post">
            {% csrf_token %}
            <label for="company">Choose a company:</label>
            <select name="company" required>
                {% for company in companies %}
                    <option value="{{ company }}">{{ company }}</option>
                {% endfor %}
            </select>
            <br>
            <button type="submit">View Questions</button>
        </form>
    </div>
</body>
</html>
