<!DOCTYPE html>
<html>
<head>
    <title>{{ company }} - HR Questions</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h2 {
            color: #1a237e;
            margin-bottom: 25px;
        }

        ul {
            list-style-type: decimal;
            padding-left: 0;
            text-align: left;
        }

        li {
            background: #f1f8ff;
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            font-size: 16px;
            color: #333;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #1a237e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        a:hover {
            background-color: #0d133f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Popular HR Questions - {{ company }}</h2>
        <ul>
            {% for question in questions %}
                <li>{{ question }}</li>
            {% endfor %}
        </ul>
        <a href="{% url 'dashboard' %}">Back to Dashboard</a>
    </div>
</body>
</html>
