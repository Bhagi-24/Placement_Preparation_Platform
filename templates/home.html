<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: url('https://img.freepik.com/free-photo/plain-dark-blue-product-background_53876-102471.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        .button {
            display: inline-block;
            padding: 15px 35px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
        }

        .button:hover {
            background-color: #69e4f4;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Placify</h1>
        <a class="button" href="{% url 'login' %}">Login</a>
    </div>
</body>
</html>
